services:
  - type: web
    name: anxin-stock-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: mock
      - key: ETF_USE_DEMO_DATA
        value: "false"
      - key: ETF_UPSTREAM_TIMEOUT_SECONDS
        value: "5"
      - key: PYTHON_VERSION
        value: 3.11.11
